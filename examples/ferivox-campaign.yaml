apiVersion: sippycup.dev/v1
kind: Campaign
metadata:
  name: ferivox-model
authorization:
  # Replace this private lab range only with a range your friend authorized.
  networks: [10.77.0.0/24, 'fd77::/64']
  signalingPorts: [5060, 5061]
  mediaPorts: {start: 20000, end: 20100}
  transports: [udp, tcp, tls]
  ceilings:
    calls: 4
    packets: 400
    bytes: 400000
    durationSeconds: 120
    concurrentCalls: 1
    packetsPerSecond: 40
    callsPerSecond: 1
  stopConditions:
    consecutiveFailures: 1
    unexpectedResponse: true
    packetLossPercent: 5
targets:
  - name: ferivox-udp-v4
    address: 10.77.0.10
    signaling: {transport: udp, port: 5060}
  - name: ferivox-udp-v6
    address: fd77::10
    signaling: {transport: udp, port: 5060}
  - name: ferivox-tcp-v4
    address: 10.77.0.10
    signaling: {transport: tcp, port: 5060}
  - name: ferivox-tcp-v6
    address: fd77::10
    signaling: {transport: tcp, port: 5060}
  - name: ferivox-tls-v4
    address: 10.77.0.10
    signaling: {transport: tls, port: 5061}
  - name: ferivox-tls-v6
    address: fd77::10
    signaling: {transport: tls, port: 5061}
cases:
  - id: model-smoke
    type: call
    target: ferivox-udp-v4
    count: 1
    budget:
      packetsPerRun: 4
      bytesPerRun: 4096
      durationSecondsPerRun: 3
matrix:
  factors:
    transport: [udp, tcp, tls]
    addressFamily: [ipv4, ipv6]
    codec: [pcmu, pcma, opus]
    ptime: [10, 20, 30]
    mediaProtection: [plain, sdes-srtp, dtls-srtp]
    dtmf: [rfc4733, sip-info, none]
    earlyMedia: [disabled, 183-sdp, reliable]
    holdReinvite: [disabled, sendonly, inactive]
    teardownInitiator: [caller, callee, timeout]
    duration: [10, 30, 60]
    nat: [none, endpoint-nat, symmetric-nat]
    impairment: [none, loss, jitter, latency, reorder]
  constraints:
    - id: tls-requires-dtls-srtp
      if: {transport: [tls]}
      then: {mediaProtection: [dtls-srtp]}
      rationale: TLS deployments are tested with the supported secure media profile.
    - id: reliable-early-media-needs-tcp
      if: {earlyMedia: [reliable]}
      then: {transport: [tcp, tls]}
      rationale: Exclude the unsupported reliable-provisional UDP path.
    - id: no-ipv6-endpoint-nat
      exclude: {addressFamily: [ipv6], nat: [endpoint-nat, symmetric-nat]}
      rationale: The lab NAT fixture only translates IPv4.
    - id: opus-ptime
      if: {codec: [opus]}
      then: {ptime: [20]}
      rationale: Ferivox currently advertises Opus with 20 ms packetization.
    - id: no-reorder-with-srtp
      exclude: {mediaProtection: [sdes-srtp, dtls-srtp], impairment: [reorder]}
      rationale: Replay-window testing is tracked separately from this campaign.
  mandatoryCases:
    - id: plain-ipv4-baseline
      values:
        transport: udp
        addressFamily: ipv4
        codec: pcmu
        ptime: 20
        mediaProtection: plain
        dtmf: rfc4733
        earlyMedia: disabled
        holdReinvite: disabled
        teardownInitiator: caller
        duration: 10
        nat: none
        impairment: none
      rationale: Always retain one simple diagnostic baseline.
  interactionStrength: 2
  riskWeights:
    - id: secure-media
      when: {mediaProtection: [sdes-srtp, dtls-srtp]}
      weight: 5
      rationale: Keying and replay behavior have higher security impact.
      coveringFactors: [transport, codec, mediaProtection]
      interactionStrength: 3
    - id: nat-impairment
      when: {nat: [endpoint-nat, symmetric-nat], impairment: [loss, jitter, latency, reorder]}
      weight: 8
      rationale: NAT plus degraded transport is a historically fragile interaction.
expectations:
  allowedSipStatuses: [100, 180, 183, 200]
  requireBidirectionalRtp: true
evidence:
  capture: true
  retainPayload: false
  directory: evidence/ferivox-model
